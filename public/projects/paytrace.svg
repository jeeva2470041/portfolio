<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)" rx="20"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="100" r="120" fill="#14b8a6" opacity="0.06"/>
  <circle cx="150" cy="350" r="80" fill="#06b6d4" opacity="0.05"/>
  <!-- Currency icon -->
  <text x="50%" y="38%" dominant-baseline="middle" text-anchor="middle" font-size="60" fill="#14b8a6" font-family="Arial" opacity="0.3">₹</text>
  <g font-family="Arial, Helvetica, sans-serif" font-weight="700">
    <text x="50%" y="52%" dominant-baseline="middle" text-anchor="middle" font-size="48" fill="url(#accent)">PayTrace</text>
    <text x="50%" y="65%" dominant-baseline="middle" text-anchor="middle" font-size="18" fill="#9ca3af" font-weight="400">Smart Payment Tracking · Hackathon Winner</text>
  </g>
</svg>
